<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Shopify Mobile Prototype</title>
    <script>
      // Redirect if opened at the wrong GitHub Pages URL (user site root)
      if (
        location.hostname.endsWith('github.io') &&
        !location.pathname.startsWith('/shopifymobile')
      ) {
        location.replace('/shopifymobile/');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
